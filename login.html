<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Secure</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  font-family:Arial;
}

.box{
  background:#111;
  padding:30px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 20px red;
}

input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:200px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:red;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2 style="color:white;">LOGIN</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Masuk</button>
</div>

<script>
function login(){

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // GANTI USER & PASSWORD DI SINI
  const benarUser = "mip";
  const benarPass = "1234";

  if(user === benarUser && pass === benarPass){
      window.location.href = "index.html";
  }else{
      alert("Salah! Keluar...");
      window.index.href = "about:blank";
  }
}
</script>

</body>
</html>
